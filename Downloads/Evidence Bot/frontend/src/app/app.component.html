<router-outlet></router-outlet>

<div class="modal fade show" style="display: block; background: rgba(0,0,0,0.5);" *ngIf="showAuthModal()">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ authMode === 'login' ? 'Login' : 'Sign up' }}</h5>
        <button type="button" class="btn-close" (click)="closeAuth()"></button>
      </div>
      <div class="modal-body">
        <form (ngSubmit)="submitAuth()">
          <div *ngIf="authMode === 'signup'" class="mb-3">
            <label class="form-label">Full name</label>
            <input class="form-control" [(ngModel)]="authForm.fullName" name="fullName" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" [(ngModel)]="authForm.email" name="email" required>
          </div>
          <div *ngIf="authMode === 'signup'" class="mb-3">
            <label class="form-label">Phone</label>
            <input class="form-control" [(ngModel)]="authForm.phone" name="phone">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" [(ngModel)]="authForm.password" name="password" required>
          </div>
          <div *ngIf="authError" class="alert alert-danger py-2">{{ authError }}</div>
          <div class="d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-light" (click)="closeAuth()">Cancel</button>
            <button type="submit" class="btn btn-primary">{{ authMode === 'login' ? 'Login' : 'Create account' }}</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
